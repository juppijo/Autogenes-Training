
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .eq-container { padding: 1.5rem 0; max-width: 640px; }
  .eq-header { margin-bottom: 2rem; }
  .eq-header h2 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  .eq-header p { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
  .progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: #534AB7; border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }
  .question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .question-number { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }
  .question-text { font-size: 16px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 1.25rem; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px 16px;
    font-size: 14px;
    color: var(--color-text-primary);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: var(--font-sans);
  }
  .option-btn:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .option-btn.selected { background: #EEEDFE; border-color: #534AB7; color: #3C3489; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .nav-btn {
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--color-background-secondary); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary { background: #534AB7; border-color: #534AB7; color: #fff; }
  .nav-btn.primary:hover { background: #3C3489; }
  .result-section { display: none; padding: 1.5rem 0; }
  .result-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; color: var(--color-text-primary); }
  .result-subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; line-height: 1.6; }
  .score-display { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .score-circle { width: 96px; height: 96px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .score-num { font-size: 28px; font-weight: 500; }
  .score-lbl { font-size: 11px; margin-top: 2px; }
  .score-desc { flex: 1; min-width: 200px; }
  .score-desc .eq-label { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: var(--color-text-primary); }
  .score-desc p { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
  .dimensions { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .dim-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
  .dim-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .dim-bar-bg { height: 6px; background: var(--color-border-tertiary); border-radius: 3px; margin-bottom: 4px; }
  .dim-bar { height: 6px; border-radius: 3px; transition: width 0.6s ease; }
  .dim-val { font-size: 12px; color: var(--color-text-secondary); }
  .restart-btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 24px; font-size: 14px; cursor: pointer; font-family: var(--font-sans); color: var(--color-text-primary); }
  .restart-btn:hover { background: var(--color-background-secondary); }
  .sendprompt-btn { background: #534AB7; border: none; border-radius: var(--border-radius-md); padding: 10px 24px; font-size: 14px; cursor: pointer; font-family: var(--font-sans); color: #fff; margin-left: 8px; }
  .sendprompt-btn:hover { background: #3C3489; }
</style>

<div class="eq-container">
  <h2 class="sr-only">EQ-Test: Emotionaler Intelligenz Quiz</h2>

  <div id="quiz-section">
    <div class="eq-header">
      <h2>EQ-Test</h2>
      <p>20 Fragen zu deiner emotionalen Intelligenz. Wähle die Antwort, die am besten zu dir passt – es gibt kein Richtig oder Falsch.</p>
    </div>
    <div class="progress-label" id="progress-label">Frage 1 von 20</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
    <div class="question-card">
      <div class="question-number" id="q-number">Frage 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-back" disabled onclick="navigate(-1)">← Zurück</button>
      <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Weiter →</button>
    </div>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-title">Dein EQ-Ergebnis</div>
    <div class="result-subtitle" id="result-subtitle"></div>
    <div class="score-display">
      <div class="score-circle" id="score-circle">
        <span class="score-num" id="score-num"></span>
        <span class="score-lbl">von 100</span>
      </div>
      <div class="score-desc">
        <div class="eq-label" id="eq-label"></div>
        <p id="eq-desc"></p>
      </div>
    </div>
    <div class="dimensions" id="dimensions"></div>
    <button class="restart-btn" onclick="restartQuiz()">Neu starten</button>
    <button class="sendprompt-btn" onclick="sendPrompt('Erkläre mir meinen EQ-Test weiter. Mein Gesamtscore war ' + lastScore + ' von 100. Was bedeutet das genau und wie kann ich meinen EQ verbessern?')">Mehr erfahren ↗</button>
  </div>
</div>

<script>
const questions = [
  { text: "Jemand kritisiert deine Arbeit scharf in einem Meeting. Wie reagierst du?", dim: "selbstwahrnehmung", options: [
    { text: "Ich werde sofort defensiv und rechtfertige mich.", score: 1 },
    { text: "Ich bin verletzt, schweige aber und denke darüber nach.", score: 2 },
    { text: "Ich höre zu, frage nach Details und nehme Sinnvolles an.", score: 4 },
    { text: "Ich danke für das Feedback und reflektiere es später.", score: 3 },
  ]},
  { text: "Du merkst, dass du wütend wirst – was machst du als erstes?", dim: "selbstregulation", options: [
    { text: "Ich drücke meine Wut direkt aus.", score: 1 },
    { text: "Ich atme tief durch und versuche mich zu beruhigen.", score: 4 },
    { text: "Ich ziehe mich kurz zurück, um mich zu sammeln.", score: 3 },
    { text: "Ich ignoriere das Gefühl und mache weiter.", score: 2 },
  ]},
  { text: "Ein Freund erzählt dir von einem persönlichen Problem. Was tust du zuerst?", dim: "empathie", options: [
    { text: "Ich höre aktiv zu, ohne sofort Ratschläge zu geben.", score: 4 },
    { text: "Ich schlage gleich Lösungen vor.", score: 2 },
    { text: "Ich erzähle von einem ähnlichen Problem bei mir.", score: 1 },
    { text: "Ich stelle Fragen, um die Situation besser zu verstehen.", score: 3 },
  ]},
  { text: "Du schaffst eine schwierige Aufgabe nicht. Wie gehst du damit um?", dim: "selbstwahrnehmung", options: [
    { text: "Ich gebe anderen die Schuld.", score: 1 },
    { text: "Ich analysiere, was schiefgelaufen ist, und lerne daraus.", score: 4 },
    { text: "Ich tue so, als wäre nichts gewesen.", score: 1 },
    { text: "Ich bin hart zu mir selbst und grübele lange.", score: 2 },
  ]},
  { text: "In einem Konflikt mit einer Kollegin – wie verhältst du dich?", dim: "soziale_kompetenz", options: [
    { text: "Ich vermeide das Gespräch, bis es sich von selbst löst.", score: 1 },
    { text: "Ich suche das Gespräch und höre zuerst ihre Seite.", score: 4 },
    { text: "Ich versuche Recht zu haben und überzeuge sie.", score: 2 },
    { text: "Ich hole eine dritte Person zur Vermittlung.", score: 3 },
  ]},
  { text: "Wie gut erkennst du, was andere Menschen fühlen, ohne dass sie es sagen?", dim: "empathie", options: [
    { text: "Kaum – ich orientiere mich an dem, was gesagt wird.", score: 1 },
    { text: "Manchmal, wenn die Emotionen sehr deutlich sind.", score: 2 },
    { text: "Meistens – ich achte auf Körpersprache und Tonfall.", score: 3 },
    { text: "Sehr gut – ich bemerke oft subtile Stimmungsveränderungen.", score: 4 },
  ]},
  { text: "Du hast ein wichtiges Ziel noch nicht erreicht. Was denkst du?", dim: "motivation", options: [
    { text: "Es war von Anfang an unrealistisch.", score: 1 },
    { text: "Ich brauche mehr Zeit, ich halte daran fest.", score: 4 },
    { text: "Ich passe mein Ziel an und plane neu.", score: 3 },
    { text: "Ich bin frustriert und fühle mich wie ein Versager.", score: 2 },
  ]},
  { text: "Jemand unterbricht dich mitten im Gespräch. Was machst du?", dim: "selbstregulation", options: [
    { text: "Ich werde innerlich gereizt, lasse es mir aber nicht anmerken.", score: 2 },
    { text: "Ich weise die Person höflich darauf hin.", score: 4 },
    { text: "Ich spreche einfach lauter weiter.", score: 1 },
    { text: "Ich schweige und verliere den Faden.", score: 2 },
  ]},
  { text: "Wie reagierst du, wenn jemand in deiner Nähe weint?", dim: "empathie", options: [
    { text: "Ich werde unsicher und weiß nicht, was ich tun soll.", score: 2 },
    { text: "Ich versuche, die Person aufzuheitern.", score: 2 },
    { text: "Ich bin einfach für sie da und höre zu.", score: 4 },
    { text: "Ich suche schnell nach einer Lösung für ihr Problem.", score: 3 },
  ]},
  { text: "Wie motivierst du dich, wenn du keine Lust hast?", dim: "motivation", options: [
    { text: "Ich erinnere mich an mein 'Warum' und starte trotzdem.", score: 4 },
    { text: "Ich warte, bis die Motivation von selbst kommt.", score: 1 },
    { text: "Ich mache kleine Schritte, um den Einstieg zu erleichtern.", score: 3 },
    { text: "Ich lenke mich ab und verschiebe es.", score: 1 },
  ]},
  { text: "Du erhältst ein Lob, das dir übertrieben erscheint. Wie reagierst du?", dim: "selbstwahrnehmung", options: [
    { text: "Ich freue mich und nehme es dankend an.", score: 3 },
    { text: "Ich sage: 'Ach, das war doch nichts Besonderes.'", score: 2 },
    { text: "Ich hinterfrage mich: Verdiene ich das wirklich?", score: 2 },
    { text: "Ich nehme es an und sage ehrlich, was ich beigetragen habe.", score: 4 },
  ]},
  { text: "Ein Team-Mitglied macht einen Fehler, der euch alle betrifft. Wie reagierst du?", dim: "soziale_kompetenz", options: [
    { text: "Ich zeige klar auf, wer schuld ist.", score: 1 },
    { text: "Ich bespreche mit dem Team, wie wir es gemeinsam lösen.", score: 4 },
    { text: "Ich erledige es still selbst, ohne viel Aufhebens.", score: 2 },
    { text: "Ich spreche die Person privat an und biete Hilfe an.", score: 3 },
  ]},
  { text: "Wie gehst du mit Stress um?", dim: "selbstregulation", options: [
    { text: "Ich verliere schnell die Übersicht und werde nervös.", score: 1 },
    { text: "Ich priorisiere und gehe strukturiert vor.", score: 4 },
    { text: "Ich arbeite durch, bis es vorbei ist.", score: 2 },
    { text: "Ich spreche mit jemandem und hole mir Unterstützung.", score: 3 },
  ]},
  { text: "Du merkst, dass ein Gespräch deinen Gesprächspartner verletzt hat. Was tust du?", dim: "empathie", options: [
    { text: "Ich merke es gar nicht.", score: 1 },
    { text: "Ich spreche es direkt an und entschuldige mich.", score: 4 },
    { text: "Ich mache weiter und hoffe, es klärt sich.", score: 1 },
    { text: "Ich suche später das Gespräch.", score: 3 },
  ]},
  { text: "Wie beschreibst du deinen Umgang mit eigenen Schwächen?", dim: "selbstwahrnehmung", options: [
    { text: "Ich verdränge sie, sie stören mich zu sehr.", score: 1 },
    { text: "Ich kenne sie und arbeite aktiv daran.", score: 4 },
    { text: "Ich versuche, sie zu verstecken.", score: 1 },
    { text: "Ich anerkenne sie, aber sie demotivieren mich.", score: 2 },
  ]},
  { text: "Jemand bittet dich um Hilfe, obwohl du gerade selbst unter Druck stehst. Was machst du?", dim: "soziale_kompetenz", options: [
    { text: "Ich helfe sofort, auch auf Kosten meiner eigenen Aufgaben.", score: 2 },
    { text: "Ich sage klar, dass ich gerade keine Kapazität habe.", score: 3 },
    { text: "Ich lehne ab, ohne zu erklären warum.", score: 1 },
    { text: "Ich biete an, später zu helfen, und erkläre meine Situation.", score: 4 },
  ]},
  { text: "Du verlierst ein Spiel oder einen Wettbewerb. Wie reagierst du?", dim: "selbstregulation", options: [
    { text: "Ich ärgere mich stark und kann nicht loslassen.", score: 1 },
    { text: "Ich gratuliere und schaue, was ich verbessern kann.", score: 4 },
    { text: "Ich tue so, als wäre es mir egal.", score: 2 },
    { text: "Ich bin kurz enttäuscht, nehme es aber sportlich.", score: 3 },
  ]},
  { text: "Wie gut kannst du langfristige Ziele verfolgen, auch wenn es schwierig wird?", dim: "motivation", options: [
    { text: "Ich gebe schnell auf, wenn Hindernisse auftauchen.", score: 1 },
    { text: "Ich halte meistens durch, verliere aber manchmal die Spur.", score: 2 },
    { text: "Ich passe meinen Weg an, halte aber am Ziel fest.", score: 4 },
    { text: "Ich bleibe dran, auch wenn es mühsam ist.", score: 3 },
  ]},
  { text: "Wie verhältst du dich in einer Gruppe, die sich uneinig ist?", dim: "soziale_kompetenz", options: [
    { text: "Ich setze meine Meinung durch.", score: 1 },
    { text: "Ich halte mich heraus und warte ab.", score: 2 },
    { text: "Ich moderiere und suche gemeinsam nach Kompromissen.", score: 4 },
    { text: "Ich höre alle Seiten an und bringe meinen Standpunkt ein.", score: 3 },
  ]},
  { text: "Wie oft reflektierst du dein eigenes Verhalten nach wichtigen Gesprächen?", dim: "selbstwahrnehmung", options: [
    { text: "Selten – ich mache einfach weiter.", score: 1 },
    { text: "Manchmal, wenn etwas schiefgelaufen ist.", score: 2 },
    { text: "Oft – ich lerne gerne aus Interaktionen.", score: 3 },
    { text: "Fast immer – es gehört für mich dazu.", score: 4 },
  ]},
];

const dimLabels = {
  selbstwahrnehmung: "Selbstwahrnehmung",
  selbstregulation: "Selbstregulation",
  empathie: "Empathie",
  motivation: "Motivation",
  soziale_kompetenz: "Soziale Kompetenz"
};

const dimColors = {
  selbstwahrnehmung: "#534AB7",
  selbstregulation: "#1D9E75",
  empathie: "#D85A30",
  motivation: "#BA7517",
  soziale_kompetenz: "#378ADD"
};

let current = 0;
let answers = new Array(questions.length).fill(null);
let lastScore = 0;

function shuffle(arr) {
  return arr.map(v => ({ v, r: Math.random() })).sort((a, b) => a.r - b.r).map(x => x.v);
}

const shuffledOptions = questions.map(q => shuffle(q.options));

function renderQuestion() {
  const q = questions[current];
  document.getElementById("q-number").textContent = "Frage " + (current + 1);
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("progress-label").textContent = "Frage " + (current + 1) + " von " + questions.length;
  document.getElementById("progress-fill").style.width = (((current + 1) / questions.length) * 100) + "%";

  const opts = document.getElementById("q-options");
  opts.innerHTML = "";
  shuffledOptions[current].forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn" + (answers[current] === i ? " selected" : "");
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(i);
    opts.appendChild(btn);
  });

  document.getElementById("btn-back").disabled = current === 0;
  const nextBtn = document.getElementById("btn-next");
  if (current === questions.length - 1) {
    nextBtn.textContent = "Auswerten →";
  } else {
    nextBtn.textContent = "Weiter →";
  }
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll(".option-btn").forEach((btn, idx) => {
    btn.classList.toggle("selected", idx === i);
  });
}

function navigate(dir) {
  if (dir === 1) {
    if (answers[current] === null) {
      const card = document.querySelector(".question-card");
      card.style.borderColor = "#D85A30";
      setTimeout(() => card.style.borderColor = "", 800);
      return;
    }
    if (current === questions.length - 1) { showResults(); return; }
    current++;
  } else {
    if (current > 0) current--;
  }
  renderQuestion();
}

function showResults() {
  document.getElementById("quiz-section").style.display = "none";
  const rs = document.getElementById("result-section");
  rs.style.display = "block";

  const dimScores = {};
  const dimMax = {};
  Object.keys(dimLabels).forEach(d => { dimScores[d] = 0; dimMax[d] = 0; });

  answers.forEach((ans, qi) => {
    const q = questions[qi];
    const score = shuffledOptions[qi][ans].score;
    dimScores[q.dim] += score;
    dimMax[q.dim] += 4;
  });

  const totalScore = Object.values(dimScores).reduce((a, b) => a + b, 0);
  const totalMax = Object.values(dimMax).reduce((a, b) => a + b, 0);
  const eq = Math.round((totalScore / totalMax) * 100);
  lastScore = eq;

  const circle = document.getElementById("score-circle");
  const scoreNum = document.getElementById("score-num");
  scoreNum.textContent = eq;

  let level, desc, bg, col;
  if (eq >= 80) {
    level = "Herausragend"; bg = "#E1F5EE"; col = "#085041";
    desc = "Du verfügst über eine sehr ausgeprägte emotionale Intelligenz. Du erkennst Emotionen – bei dir und anderen – schnell und gehst einfühlsam und konstruktiv damit um.";
  } else if (eq >= 65) {
    level = "Gut entwickelt"; bg = "#EEEDFE"; col = "#3C3489";
    desc = "Dein EQ ist gut ausgeprägt. Du bist emotional reflektiert und in den meisten sozialen Situationen anpassungsfähig. Einige Bereiche bieten noch Wachstumspotenzial.";
  } else if (eq >= 45) {
    level = "Durchschnittlich"; bg = "#FAEEDA"; col = "#633806";
    desc = "Du hast grundlegende emotionale Fähigkeiten, aber es gibt deutliche Bereiche, in denen du dich weiterentwickeln kannst – besonders unter Druck oder in Konfliktsituationen.";
  } else {
    level = "Im Aufbau"; bg = "#FAECE7"; col = "#712B13";
    desc = "Dein EQ hat noch viel Wachstumspotenzial. Gute Nachricht: Emotionale Intelligenz lässt sich gezielt trainieren – und der erste Schritt ist, dass du diesen Test gemacht hast.";
  }

  circle.style.background = bg;
  scoreNum.style.color = col;
  document.querySelector(".score-circle .score-lbl").style.color = col;
  document.getElementById("eq-label").textContent = level;
  document.getElementById("eq-desc").textContent = desc;

  const sub = "Dein EQ-Score: " + eq + " / 100 · " + level;
  document.getElementById("result-subtitle").textContent = sub;

  const dimContainer = document.getElementById("dimensions");
  dimContainer.innerHTML = "";
  Object.entries(dimLabels).forEach(([key, label]) => {
    const pct = Math.round((dimScores[key] / dimMax[key]) * 100);
    const card = document.createElement("div");
    card.className = "dim-card";
    card.innerHTML = `
      <div class="dim-name">${label}</div>
      <div class="dim-bar-bg"><div class="dim-bar" style="width:${pct}%; background:${dimColors[key]}"></div></div>
      <div class="dim-val">${pct}%</div>
    `;
    dimContainer.appendChild(card);
  });
}

function restartQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById("result-section").style.display = "none";
  document.getElementById("quiz-section").style.display = "block";
  renderQuestion();
}

renderQuestion();
</script>
